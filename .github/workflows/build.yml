name: Build Windows executable

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar PyInstaller
        run: pip install pyinstaller

      - name: Compilar LimpiadorCache.exe
        run: pyinstaller --noconfirm --onefile --windowed --name "LimpiadorCache" --uac-admin main.py

      - name: Subir ejecutable como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: LimpiadorCache
          path: dist/LimpiadorCache.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LimpiadorCache
          path: dist

      - name: Crear Release con el .exe adjunto
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LimpiadorCache.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
